<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NASA Space Explorer</title>
    <style>
        :root {
            --space-bg: radial-gradient(circle at center, #1e1b4b 0%, #0f172a 100%);
            --glass-bg: rgba(255, 255, 255, 0.07);
            --glass-border: rgba(255, 255, 255, 0.1);
            --accent: #6366f1;
            --accent-hover: #4f46e5;
        }

        body { 
            font-family: 'Inter', sans-serif; 
            background: var(--space-bg); 
            color: #f8fafc; 
            min-height: 100vh; 
            margin: 0; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            padding: 40px 20px;
        }

        @keyframes fadeIn { 
            from { opacity: 0; transform: translateY(20px); } 
            to { opacity: 1; transform: translateY(0); } 
        }

        h1 { font-weight: 600; letter-spacing: -0.05em; margin-bottom: 30px; }

        .apod-container { 
            max-width: 700px; 
            width: 100%;
            text-align: center; 
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 30px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            animation: fadeIn 0.8s ease-out;
        }

        img { 
            max-width: 100%; 
            height: auto; 
            border-radius: 16px; 
            margin: 20px 0; 
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3);
        }

        button { 
            background: var(--accent); 
            color: white; 
            border: none; 
            padding: 12px 24px; 
            border-radius: 12px; 
            font-weight: 600;
            cursor: pointer; 
            transition: all 0.3s ease;
            margin-bottom: 30px;
        }
        button:hover { 
            transform: translateY(-2px); 
            background: var(--accent-hover); 
            box-shadow: 0 4px 12px rgba(99, 102, 241, 0.4);
        }

        #explanation {
            line-height: 1.6;
            color: #cbd5e1;
            font-size: 0.95rem;
            text-align: left;
        }
    </style>
</head>
<body>

    <h1>NASA Space Explorer</h1>
    <button id="randomBtn">Explore Random Space</button>
    
    <div id="display" class="apod-container">
        <h2 id="title">Loading...</h2>
        <img id="image" src="" alt="Space Image">
        <p id="explanation"></p>
    </div>

    <script>
        const apiKey = "DEMO_KEY"; 
        const display = document.getElementById('display');

        async function fetchImage(isRandom = false) {
            display.style.animation = 'none';
            display.offsetHeight; 
            display.style.animation = 'fadeIn 0.8s ease-out';

            const url = isRandom 
                ? `https://api.nasa.gov/planetary/apod?api_key=${apiKey}&count=1`
                : `https://api.nasa.gov/planetary/apod?api_key=${apiKey}`;

            try {
                const response = await fetch(url);
                
                // Handle rate limits (429) explicitly
                if (response.status === 429) {
                    throw new Error("Rate limit exceeded. Too many requests using the shared DEMO_KEY.");
                }
                
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                
                const data = await response.json();
                const item = isRandom ? data[0] : data;
                
                if (!item) throw new Error("No data received");

                document.getElementById('title').innerText = item.title;
                document.getElementById('image').src = item.url;
                document.getElementById('image').alt = item.title;
                document.getElementById('explanation').innerText = item.explanation;

            } catch (err) {
                console.error("Error fetching data:", err);
                
                // Friendly error message for the user
                document.getElementById('title').innerText = "Oops! Rate Limit Hit";
                document.getElementById('image').src = ""; 
                document.getElementById('explanation').innerText = 
                    "NASA's public API key is currently being used by too many people. " +
                    "To fix this, please get your own free API key from 'api.nasa.gov' " +
                    "and replace 'DEMO_KEY' in the code with your new key.";
            }
        }

        document.getElementById('randomBtn').addEventListener('click', () => fetchImage(true));
        
        fetchImage();
    </script>
</body>
</html>
