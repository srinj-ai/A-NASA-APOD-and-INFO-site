<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Explore NASA's Astronomy Picture of the Day with stunning space imagery and explanations.">
    <title>NASA Space Explorer</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./css/styles.css">
</head>
<body>
    <header class="topbar" aria-label="Dashboard header">
        <div class="brand">
            <img class="brand-logo" src="./css/nasa-logo.png" alt="NASA logo">
            <div>
                <p class="brand-kicker">Dashboard</p>
                <h1>NASA Space Explorer</h1>
            </div>
        </div>
    </header>
    <p id="status" class="sr-only" aria-live="polite">Loading today's Astronomy Picture of the Day.</p>
    <button id="randomBtn" type="button" aria-describedby="status">Explore Random Space</button>

    <div id="display" class="apod-container" aria-labelledby="title">
        <h2 id="title">Loading...</h2>
        <div class="media-frame" aria-label="Astronomy Picture of the Day media">
            <img id="image" src="" alt="Space Image" loading="lazy" decoding="async">
            <iframe id="video" title="Astronomy Picture of the Day video" hidden></iframe>
        </div>
        <p id="explanation"></p>
    </div>

    <script type="module" src="./js/app.js"></script>
</body>
</html>
